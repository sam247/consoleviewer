name: SerpRobot Sync

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  trigger-serprobot-sync:
    environment: Production
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SerpRobot sync endpoint
        env:
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing required secrets: CRON_BASE_URL and/or CRON_SECRET"
            exit 1
          fi

          RESPONSE=$(curl --silent --show-error --location \
            --write-out "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_BASE_URL/api/cron/serprobot-sync")

          BODY=$(printf "%s" "$RESPONSE" | sed '$d')
          STATUS=$(printf "%s" "$RESPONSE" | sed -n '$p')

          echo "HTTP $STATUS"
          echo "$BODY"

          if [ "$STATUS" -ge 400 ]; then
            exit 1
          fi
